<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Amazon Ember', sans-serif;
            background: #232f3e;
            color: white;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff9900;
            margin-bottom: 10px;
        }
        .status {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 20px;
        }
        button {
            background: #ff9900;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #e47911;
        }
        .desc {
            font-size: 12px;
            margin-top: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="logo">Rufus AI Filter</div>
    <div class="status">Assistant is Active</div>
    <button id="open-amazon">Shop on Amazon</button>
    <div class="desc">Open any Amazon search page to start using the Rufus AI Assistant.</div>
    <script>
        document.getElementById('open-amazon').onclick = () => {
            window.open('https://www.amazon.com/s?k=laptop', '_blank');
        };
    </script>
</body>
</html>
