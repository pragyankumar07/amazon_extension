<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Amazon Ember', sans-serif;
            background: #232f3e;
            color: white;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff9900;
            margin-bottom: 10px;
        }

        .status {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 20px;
        }

        button {
            background: #ff9900;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #e47911;
        }

        .desc {
            font-size: 12px;
            margin-top: 15px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div class="logo">RapidBrowse AI</div>
    <div class="status">Assistant is Active</div>

    <div class="settings-section"
        style="margin-bottom: 20px; text-align: left; background: #2c3e50; padding: 15px; border-radius: 8px;">
        <label for="api-key"
            style="display: block; font-size: 12px; color: #ff9900; margin-bottom: 5px; font-weight: bold;">Gemini API
            Key</label>
        <div style="display: flex; gap: 8px;">
            <input type="password" id="api-key" placeholder="Enter your key..."
                style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #1a2634; color: white; font-size: 12px;">
            <button id="save-key" style="width: auto; padding: 8px 15px; font-size: 12px;">Save</button>
        </div>
        <div id="save-status" style="font-size: 11px; margin-top: 5px; color: #4caf50; height: 15px;"></div>
    </div>

    <button id="open-amazon">Shop on Amazon</button>
    <div class="desc">Open any Amazon search page to start using the RapidBrowse AI Assistant.</div>
    <script src="src/popup.js"></script>
</body>

</html>
